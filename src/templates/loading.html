<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>モンスター孵化準備中</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="decoration side-left">
    <img src="{{ url_for('static', filename='media/deco1.png') }}" alt="">
    <img src="{{ url_for('static', filename='media/deco2.png') }}" alt="">
  </div>
  <div class="decoration side-right">
    <img src="{{ url_for('static', filename='media/deco3.png') }}" alt="">
    <img src="{{ url_for('static', filename='media/deco4.png') }}" alt="">
  </div>
  <main class="page">
    <section class="panel loading-panel">
      <div class="spinner" aria-hidden="true"></div>
      <h1 id="loadingTitle">モンスター孵化準備中・・・</h1>
      <p id="loadingNote" class="loading-note">生成には数分かかる場合があります。ページを閉じずにお待ちください。</p>
      <div class="loading-video-wrap">
        <video id="loadingVideo" class="loading-video" autoplay loop muted playsinline webkit-playsinline preload="auto">
          <source src="{{ url_for('static', filename='media/loading-loop.webm') }}" type="video/webm">
          ご利用のブラウザは動画再生に対応していません。
        </video>
      </div>
      <div class="button-row">
        <button id="backButton" class="secondary" type="button">入力画面に戻る</button>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
