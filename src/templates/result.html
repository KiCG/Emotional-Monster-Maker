<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>孵化予定時刻</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    .result-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }
    .hatching-title {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text-color);
      margin-top: 2rem;
    }
    .hatching-time {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 2rem;
      color: var(--primary-color, #007bff);
      letter-spacing: 0.1em;
    }
    .video-container {
      width: 100%;
      max-width: 600px;
      margin-bottom: 2rem;
    }
    .video-container video {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel result-container">
      <div class="hatching-title">孵化予定時刻</div>
      <div id="hatchingTime" class="hatching-time">HH : MM</div>
      
      <div class="video-container">
        <!-- 差し替え可能な動画エリア -->
        <video id="resultVideo" autoplay loop muted playsinline webkit-playsinline>
          <source src="{{ url_for('static', filename='media/result-loop.webm') }}" type="video/webm">
          ご利用のブラウザは動画再生に対応していません。
        </video>
      </div>

      <div class="button-row">
        <button id="backButton" class="secondary" type="button" onclick="window.location.href='/'">最初に戻る</button>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    // 例として、現在時刻から5分後を「孵化予定時刻」として表示するロジック
    // ※用途に合わせて自由に調整してください
    const now = new Date();
    now.setMinutes(now.getMinutes() + 5);
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('hatchingTime').textContent = `${hh} : ${mm}`;
  </script>
</body>
</html>
