<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emotional Monster Maker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="decoration side-left">
    <img src="{{ url_for('static', filename='media/deco1.png') }}" alt="">
    <img src="{{ url_for('static', filename='media/deco2.png') }}" alt="">
  </div>
  <div class="decoration side-right">
    <img src="{{ url_for('static', filename='media/deco3.png') }}" alt="">
    <img src="{{ url_for('static', filename='media/deco4.png') }}" alt="">
  </div>
  <main class="page">
    <section class="panel">
      <header class="panel-header centered">
        <h1>Emotional Monster Maker</h1>
        <p>感情パラメータを入力して、君だけの感情モンスターを作ろう！</p>
      </header>

      <form id="emotionForm" class="slider-grid" onsubmit="return false;">
        <!-- ... スライダー部分はそのまま ... -->
        <label class="slider-row" for="joy">
          <span class="name">Joy (喜び)</span>
          <span class="value-pill" id="joy_v">3.00</span>
          <input id="joy" type="range" min="1" max="5" step="0.01" value="3.00" data-key="joy">
        </label>

        <label class="slider-row" for="calm">
          <span class="name">Calm (穏やか)</span>
          <span class="value-pill" id="calm_v">3.00</span>
          <input id="calm" type="range" min="1" max="5" step="0.01" value="3.00" data-key="calm">
        </label>

        <label class="slider-row" for="anger">
          <span class="name">Anger (怒り)</span>
          <span class="value-pill" id="anger_v">3.00</span>
          <input id="anger" type="range" min="1" max="5" step="0.01" value="3.00" data-key="anger">
        </label>

        <label class="slider-row" for="sadness">
          <span class="name">Sadness (悲しみ)</span>
          <span class="value-pill" id="sadness_v">3.00</span>
          <input id="sadness" type="range" min="1" max="5" step="0.01" value="3.00" data-key="sadness">
        </label>

        <label class="slider-row" for="fear">
          <span class="name">Fear (恐怖)</span>
          <span class="value-pill" id="fear_v">3.00</span>
          <input id="fear" type="range" min="1" max="5" step="0.01" value="3.00" data-key="fear">
        </label>
      </form>

      <div class="button-row main-actions">
        <button id="loadingTestButton" class="secondary large" type="button">デモ表示（生成なし）</button>
        <button id="runButton" class="large" type="button">生成を開始</button>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
